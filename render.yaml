services:
  - type: web
    name: civiai-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run prisma:migrate:deploy && npm run start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: civiai-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AUTH_ENABLED
        value: "true"
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: civiai-db
    plan: free
